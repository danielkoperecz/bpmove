<!--
  BPMOVE – e-mail aláírás
  ----------------------
  Hogyan használd:
  1. Másold ki ennek a fájlnak a TARTALMÁT (a kommentet alatti részt, a <table>-től kezdve)
  2. Gmail: Beállítások → Általános → Aláírás → "Új aláírás létrehozása" → illeszd be (vagy formázott HTML-ként a böngésző fejlesztői eszközéből beillesztve)
     Egyszerűbben: nyisd meg ezt a fájlt böngészőben, jelöld ki Cmd+A-val az egészet, másold Cmd+C-vel, majd illeszd be Cmd+V-vel a Gmail aláírás mezőjébe.
  3. Outlook: Fájl → Beállítások → Levél → Aláírások → új aláírás → illeszd be HTML-ben.
  4. Apple Mail: Beállítások → Aláírások → új → illeszd be (lehet, hogy a "Mindig az alapértelmezett betűtípust használja" opciót ki kell venni).

  Cseréld a saját nevedre / pozíciódra a következő helyeken:
    - "Kovács Anna"      ← A te neved
    - "ügyfélkapcsolat"  ← A pozíciód (vagy hagyd üresen)
-->
