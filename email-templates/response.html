<!doctype html>
<!--
  BPMOVE – brandelt e-mail body template
  --------------------------------------
  Hogyan használd:
  1. Nyisd meg ezt a fájlt böngészőben (kattints duplán)
  2. Jelöld ki az egész renderelt e-mailt (Cmd+A), majd Cmd+C
  3. A Gmail/Outlook/Apple Mail új levél ablakába illeszd be (Cmd+V) –
     megőrzi a HTML formázást
  4. Cseréld le a {{...}} placeholdereket a tényleges tartalomra:
       {{ÜGYFÉL_NÉV}}, {{TÁRGY}}, {{TÖRZSSZÖVEG}}, stb.

  TIPP: Ha gyakran küldesz hasonló leveleket, készíts több verziót:
    - response-arajanlat.html (árajánlat küldés)
    - response-emlekezteto.html (követés)
    - response-koszonet.html (köszönő levél)
-->
<html lang="hu">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <title>BPMOVE – levelezés</title>
    </head>
    <body
        style="
            margin: 0;
            padding: 0;
            background: #f4f4f5;
            font-family:
                -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                'Helvetica Neue', Arial, sans-serif;
            color: #0f172a;
            -webkit-font-smoothing: antialiased;
        "
    >
        <table
            role="presentation"
            width="100%"
            cellpadding="0"
            cellspacing="0"
            border="0"
            style="background: #f4f4f5; padding: 24px 12px"
        >
            <tr>
                <td align="center">
                    <!-- ============ Main email card ============ -->
                    <table
                        role="presentation"
                        width="600"
                        cellpadding="0"
                        cellspacing="0"
                        border="0"
                        style="
                            max-width: 600px;
                            width: 100%;
                            background: #ffffff;
                            border-radius: 14px;
                            overflow: hidden;
                            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.06);
                        "
                    >
                        <!-- Brand header bar -->
                        <tr>
                            <td
                                style="
                                    background: #ea580c;
                                    background-image: linear-gradient(
                                        135deg,
                                        #ea580c 0%,
                                        #f97316 100%
                                    );
                                    padding: 22px 32px;
                                    color: #ffffff;
                                "
                            >
                                <table
                                    role="presentation"
                                    width="100%"
                                    cellpadding="0"
                                    cellspacing="0"
                                    border="0"
                                >
                                    <tr>
                                        <td>
                                            <span
                                                style="
                                                    font-size: 22px;
                                                    font-weight: 800;
                                                    letter-spacing: 0.5px;
                                                "
                                                >📦 BPMOVE</span
                                            >
                                        </td>
                                        <td
                                            align="right"
                                            style="
                                                font-size: 13px;
                                                opacity: 0.92;
                                            "
                                        >
                                            Költöztetés &middot; 0-24
                                        </td>
                                    </tr>
                                </table>
                            </td>
                        </tr>

                        <!-- ============ Body ============ -->
                        <tr>
                            <td style="padding: 32px">
                                <!-- Greeting -->
                                <p
                                    style="
                                        margin: 0 0 16px;
                                        font-size: 16px;
                                        line-height: 1.6;
                                    "
                                >
                                    Kedves <strong>{{ÜGYFÉL_NÉV}}</strong>,
                                </p>

                                <!-- Body paragraph 1 -->
                                <p
                                    style="
                                        margin: 0 0 16px;
                                        font-size: 15px;
                                        line-height: 1.7;
                                        color: #334155;
                                    "
                                >
                                    Köszönjük megkeresését!
                                </p>


                                <!-- Body paragraph 2 -->
                                <p
                                    style="
                                        margin: 0 0 24px;
                                        font-size: 15px;
                                        line-height: 1.7;
                                        color: #334155;
                                    "
                                >
                                    {{TÖRZSSZÖVEG_2}}
                                </p>

                                <!-- Closing -->

                                    style="
                                        margin: 0 0 4px;
                                        font-size: 15px;
                                        line-height: 1.6;
                                        color: #334155;
                                    "
                                >
                                    Üdvözlettel,
                                </p>

                                <!-- ============ Inline signature ============ -->
                                <table
                                    role="presentation"
                                    cellpadding="0"
                                    cellspacing="0"
                                    border="0"
                                    style="margin-top: 18px"
                                >
                                    <tr>
                                        <td
                                            valign="top"
                                            style="
                                                padding-right: 16px;
                                                border-right: 3px solid
                                                    #ea580c;
                                            "
                                        >
                                            <table
                                                cellpadding="0"
                                                cellspacing="0"
                                                border="0"
                                            >
                                                <tr>
                                                    <td
                                                        align="center"

                                                        width="56"
                                                        height="56"
                                                        style="
                                                            width: 56px;
                                                            height: 56px;
                                                            background: #ea580c;
                                                            background-image: linear-gradient(
                                                                135deg,
                                                                #ea580c 0%,
                                                                #f97316 100%
                                                            );
                                                            border-radius: 12px;
                                                            color: #ffffff;
                                                            font-size: 28px;
                                                            line-height: 56px;
                                                            text-align: center;
                                                        "
                                                    >
                                                        📦
                                                    </td>
                                                </tr>
                                            </table>
                                        </td>
                                        <td width="14" style="width: 14px"></td>
                                        <td valign="top">
                                            <div
                                                style="
                                                    font-size: 16px;
                                                    font-weight: 700;
                                                    color: #0f172a;
                                                "
                                            >
                                                Kocsis Ádám
                                            </div>
                                            <div
                                                style="
                                                    font-size: 13px;
                                                    color: #64748b;
                                                    margin-bottom: 6px;
                                                "
                                            >
                                                Tulajdonos &middot;
                                                <span
                                                    style="
                                                        color: #ea580c;
                                                        font-weight: 600;
                                                    "
                                                    >BPMOVE</span
                                                >
                                            </div>
                                            <div
                                                style="
                                                    font-size: 13px;
                                                    color: #475569;
                                                    line-height: 1.5;
                                                "
                                            >
                                                📞
                                                <a
                                                    href="tel:+36301554066"
                                                    style="
                                                        color: #475569;
                                                        text-decoration: none;
                                                    "
                                                    >06 30 155 4066</a
                                                ><br />
                                                ✉️
                                                <a
                                                    href="mailto:info@bpmove.hu"
                                                    style="

                                                        text-decoration: none;
                                                    "
                                                    >info@bpmove.hu</a
                                                ><br />
                                                🌐
                                                <a
                                                    href="https://bpmove.hu"
                                                    style="
                                                        color: #475569;
                                                        text-decoration: none;
                                                    "
                                                    >bpmove.hu</a
                                                >
                                            </div>
                                        </td>
                                    </tr>
                                </table>
                            </td>
                        </tr>

                        <!-- Bottom CTA strip -->
                        <tr>
                            <td
                                style="
                                    background: #f8fafc;
                                    border-top: 1px solid #e2e8f0;
                                    padding: 16px 32px;
                                    text-align: center;
                                "
                            >
                                <table
                                    role="presentation"
                                    cellpadding="0"
                                    cellspacing="0"
                                    border="0"
                                    align="center"
                                >
                                    <tr>
                                        <td
                                            style="
                                                font-size: 12px;
                                                color: #64748b;
                                            "
                                        >
                                            <a
                                                href="https://wa.me/36301554066"

                                            <a
                                                href="https://bpmove.hu"
                                                style="
                                                    color: #64748b;
                                                    text-decoration: none;
                                                "
                                                >bpmove.hu</a
                                            >
                                            &nbsp;·&nbsp; 0-24 elérhetőség
                                        </td>
                                    </tr>
                                </table>
                            </td>
                        </tr>
                    </table>

                    <!-- Footer disclaimer -->
                    <table
                        role="presentation"
                        width="600"
                        cellpadding="0"
                        cellspacing="0"
                        border="0"
                        style="max-width: 600px; width: 100%; margin-top: 12px"
                    >
                        <tr>
                            <td
                                style="
                                    padding: 0 16px;
                                    text-align: center;
                                    font-size: 11px;
                                    color: #94a3b8;
                                    line-height: 1.5;
                                "
                            >
                                © 2026 BPMOVE Kft. &middot; Minden jog
                                fenntartva
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
    </body>
</html>
